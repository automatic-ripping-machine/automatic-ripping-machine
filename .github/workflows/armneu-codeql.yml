name: armneu-codeql
# NOTE: update branch refs when this work moves to its final branch/fork
on:
  push:
    branches: [3.0_devel]
    paths: ["arm-neu/**"]
  pull_request:
    paths: ["arm-neu/**"]
  schedule:
    - cron: "0 4 * * 1"
permissions:
  security-events: write
  contents: read
jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4
