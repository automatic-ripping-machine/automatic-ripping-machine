name: armneu-shellcheck
# NOTE: update branch refs when this work moves to its final branch/fork
on:
  push:
    branches: [3.0_devel]
    paths: ["arm-neu/**"]
  pull_request:
    paths: ["arm-neu/**"]
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck arm-neu scripts
        run: |
          mapfile -t files < <(find arm-neu -type f -name '*.sh')
          if [ ${#files[@]} -eq 0 ]; then echo "no shell scripts"; exit 0; fi
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -S error "${files[@]}"
