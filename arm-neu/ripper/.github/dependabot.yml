version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"

  # gitsubmodule ecosystem removed: components/contracts is maintained by
  # the bump-submodule workflow (auto-PRs on every contracts main push),
  # and the obsolete components/transcoder and components/ui pins were
  # retired with that cleanup. No other submodules remain.

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
