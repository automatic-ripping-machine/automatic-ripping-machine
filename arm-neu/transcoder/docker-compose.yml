services:
  # Webhook receiver and transcode orchestrator
  arm-transcoder:
    image: uprightbass360/arm-transcoder:${TRANSCODER_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        contracts: ./components/contracts
    container_name: arm-transcoder
    restart: unless-stopped
    ports:
      - "${WEBHOOK_PORT:-5000}:5000"
    environment:
      - TZ=${TZ:-America/New_York}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # User identity — match ARM_UID/ARM_GID for NFS compatibility
      - TRANSCODER_UID=${TRANSCODER_UID:-1001}
      - TRANSCODER_GID=${TRANSCODER_GID:-1000}
      # Paths inside container
      - RAW_PATH=/data/raw
      - COMPLETED_PATH=/data/completed
      - WORK_PATH=/data/work
      - DB_PATH=/data/db/transcoder.db
      # Authentication
      - REQUIRE_API_AUTH=${REQUIRE_API_AUTH:-false}
      - API_KEYS=${API_KEYS:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      # ARM callback — notify ARM when jobs complete/fail
      - ARM_CALLBACK_URL=${ARM_CALLBACK_URL:-}
      # Encoding is driven by the preset system (selected_preset_slug +
      # global_overrides via PATCH /config). The flat v1 keys
      # (VIDEO_ENCODER / VIDEO_QUALITY / AUDIO_ENCODER / SUBTITLE_MODE /
      # HANDBRAKE_PRESET*) were retired in the v17.x preset rollout and
      # are no longer read by the transcoder.
      - LOG_LEVEL_LIBRARIES=${LOG_LEVEL_LIBRARIES:-WARNING}
      # File handling
      - DELETE_SOURCE=${DELETE_SOURCE:-true}
      - OUTPUT_EXTENSION=${OUTPUT_EXTENSION:-mkv}
      # Performance
      - MAX_CONCURRENT=${MAX_CONCURRENT:-1}
      - STABILIZE_SECONDS=${STABILIZE_SECONDS:-60}
      - MINIMUM_FREE_SPACE_GB=${MINIMUM_FREE_SPACE_GB:-10}
      - MAX_RETRY_COUNT=${MAX_RETRY_COUNT:-3}
      - LOG_PATH=/data/logs
    volumes:
      # Shared storage — set in .env to match your NFS/SMB mount points
      - ${HOST_RAW_PATH:-./raw}:/data/raw:rw
      - ${HOST_COMPLETED_PATH:-./completed}:/data/completed:rw
      # Local paths
      - ${WORK_PATH:-./work}:/data/work:rw
      - ${DB_PATH:-./data}:/data/db:rw
      - ${PRESET_PATH:-./presets}:/config/presets:ro
      - ${LOG_PATH:-./logs}:/data/logs:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Run ARM ripper alongside (uncomment if desired)
  # arm-rippers:
  #   image: uprightbass360/automatic-ripping-machine:latest
