name: Publish HandBrake Image

on:
  push:
    branches: [main]
    paths:
      - VERSION_HANDBRAKE
      - Dockerfile.handbrake
  schedule:
    - cron: "0 6 * * 1"   # Weekly Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/arm-handbrake
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/arm-handbrake

jobs:
  build-handbrake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Read HandBrake version
        id: version
        run: echo "version=$(cat VERSION_HANDBRAKE)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push HandBrake image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.handbrake
          push: true
          platforms: linux/amd64
          build-args: HANDBRAKE_VERSION=${{ steps.version.outputs.version }}
          build-contexts: |
            contracts=components/contracts
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.description=HandBrake ${{ steps.version.outputs.version }} CLI (NVENC/NVDEC/QSV)
