[flake8]
exclude = .git, */migrations/*
max-line-length=160

[tool:pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -m "not integration"
markers =
    integration: tests that require running containers (run with -m integration)

[coverage:run]
source = arm
omit =
    arm/ui/templates/*
    test/*

[coverage:report]
show_missing = true
