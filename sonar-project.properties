# SonarCloud configuration.
#
# Scope: only narrows issue reporting for the imported `arm-neu/` tree. The
# legacy `arm/` application is intentionally left untouched.
#
# Rationale: the bulk of "High" findings in arm-neu are raised against TEST
# fixtures (pytest/vitest) — e.g. "temporary files in publicly writable
# directories" (S5443) and hard-coded test tokens. These are test-only
# constructs, not production risks, so issue reporting is suppressed on the
# test paths. Production arm-neu code is still fully analyzed.
#
# NOTE: this only takes effect if the SonarCloud project is configured to read
# repository-level configuration (CI-based analysis or automatic analysis with
# repo config enabled). If the project uses UI-only settings, mirror these
# exclusions there.

sonar.issue.ignore.multicriteria=armneutest1,armneutest2,armneutest3

# Python test suites (ripper uses test/, others use tests/)
sonar.issue.ignore.multicriteria.armneutest1.ruleKey=*
sonar.issue.ignore.multicriteria.armneutest1.resourceKey=arm-neu/**/test/**

sonar.issue.ignore.multicriteria.armneutest2.ruleKey=*
sonar.issue.ignore.multicriteria.armneutest2.resourceKey=arm-neu/**/tests/**

# Frontend (vitest) test suites
sonar.issue.ignore.multicriteria.armneutest3.ruleKey=*
sonar.issue.ignore.multicriteria.armneutest3.resourceKey=arm-neu/**/__tests__/**
